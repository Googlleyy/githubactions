name: cache-pipeline

on:
  push:
    paths:
      - 'githubactions/.github/workflows/task12.yaml'

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v4
     - uses: actions/cache@v4
       with:
         path: ~/.npm
         key: cache-${{ hashFiles('package-lock.json')}}
     - run: npm install        

