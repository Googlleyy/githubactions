name: node-pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Node setup"
        uses: actions/setup-node@v4
        with:
         node-version: 18
      
      - run: npm install

      - run: npm test